sandbox_mode = "read-only"
approval_policy = "on-request"
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
approvals_reviewer = "guardian_subagent"


[profiles.openrouter-codex]
model_provider = "openrouter"
model_reasoning_effort = "high"
model = "openai/gpt-5.3-codex"

[profiles.spark]
model = "gpt-5.3-codex-spark"
model_reasoning_effort = "medium"

[profiles.qwen]
model_provider = "llamacpp"
model_reasoning_effort = "high"
model = "qwen/qwen3.6-35b-a3b"
model_catalog_json = "/var/home/celeste/.config/codex/model.json"


[model_providers.openrouter]
name = "openrouter"

base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"
wire_api = "responses"

[model_providers.llamacpp]
name = "llama.cpp"

base_url = "https://llama-server.catfish-dinosaur.ts.net/v1"
wire_api = "responses"

[features]
js_repl = true
memories = true
external_migration = true

[notice.external_config_migration_prompts]
home_last_prompted_at = 1777469676
home = true

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[tui]
theme = "ansi"

[tui.model_availability_nux]
"gpt-5.5" = 4

[mcp_servers.godot]
command = "bunx"
args = ["@coding-solo/godot-mcp"]

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"

[mcp_servers.pterodactyl]
command = "nu"
args = ["/var/home/celeste/.local/bin/pterodactyl-mcp.nu"]

[projects."/var/home/celeste/.local/share/chezmoi"]
trust_level = "trusted"

